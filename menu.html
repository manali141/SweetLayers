<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweet Layers Cake</title>
  <link rel="stylesheet" href="Style/Style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <!-- Header Start -->
  <header class="header">
    <nav class="navbar container">
      <div class="logo">
        <a href="index.html" class="logoLink">
          <span>Sweet Layers</span>
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="menu.html" class="nav-link">Menu</a></li>
        <li><a href="contact.html" class="nav-link">Contact Us</a></li>
      </ul>
    </nav>
  </header>
  <!-- Hero Section -->
  <section class="Menuhero">
    <div class="Menuoverlay"></div>

    <div class="menu-hero-content">
      <h1>Our Menu</h1>
      <p>
        Explore our collection of handcrafted cakes. Everything is baked fresh to order.
      </p>

    </div>
  </section>

<section class="Menugrid container">
  <div class="feature">
    
    <div class="searchBar">
      <input 
        type="text" 
        name="Search" 
        id="Search" 
        class="txtSearch" 
        placeholder="Search cakes..."
      />
    </div>

    <div class="filterSection">
      <select id="categoryFilter" class="filterSelect">
        <option value="all">All Categories</option>
        <option value="birthday">Birthday Cakes</option>
        <option value="wedding">Wedding Cakes</option>
        <option value="cupcake">Cupcakes</option>
        <option value="chocolate">Chocolate Cakes</option>
        <option value="eggless">Eggless Cakes</option>
      </select>

      <select id="sortPrice" class="filterSelect">
        <option value="default">Sort By Price</option>
        <option value="lowToHigh">Price: Low to High</option>
        <option value="highToLow">Price: High to Low</option>
      </select>
      
    </div>

  </div>

  <div class="MenucardDisplay"></div>
</section>
   

  <footer class="footer">
    <div class="container">
      <div class="footerContain">
        <div class="footerInfo">
          <h2>Sweet Layers</h2>
          <p>Crafting sweet moments and beautiful layers for your special occasions.</p>
        </div>
        <div class="footerMenu">
           <a href="index.html" class="nav-link">Home</a>
           <a href="menu.html" class="nav-link">Menu</a>
           <a href="contact.html" class="nav-link">Contact Us</a>
        </div>
      </div>
      <hr>
      <div class="footerCopyRight">
          <p>© 2026 Sweet Layers Bakery. All rights reserved.</p>
      </div>
    </div>
  </footer>
  <script src="Script/menuScript.js" type="text/javascript"></script>
</body>
</html>
